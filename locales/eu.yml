    meetings:
      f3: Organize face-to-face or online <strong>meetings</strong>, manage registrations, and publish the agenda.<br> And much more!
    proposals:
      f1: Collect <strong>proposals</strong> from participants, enriched with geolocation and attachments, merge similar ones, and set a workflow for official approval or rejection.
    voting:
      f2: Prioritize proposals using various <strong>voting</strong> methods, such as setting minimum and maximum thresholds, weighted voting, or participatory budgeting.
  features:
    component_groups:
      group_1:
        title: Receive Contributions
      group_2:
        title: Discuss and deliberate
      group_3:
        title: Make Decisions
      group_4:
        title: Communicate Results to your audience
    intro: You can use the Decidim software in a public or private organisation, with hundreds or thousands of potential participants, such as a city council, public institution, associations, NGOs, universities, trade unions, cooperatives or neighbourhood communities. With Decidim you will be able to configure spaces for digital participation and organize contributions and discussions through the multiple available components.
    modules:
      button: Hasi erabiltzen
      intro: Grow beyond the default components.
      subtitle: The Decidim community has developed hundreds of modules to expand the platform beyond the basics and cater to your needs even better.
      title: Moduloak
    need_help:
      button: Tokiko inplementatzaileak
      subtitle: Take a look at the partners community, Decidim official service providers that can assist you on the installation journey, the hosting and maintenance of your platform.
      title: Need help in the installation?
    page:
      feature1:
        label: Partaidetza-prozesuak
        subtitle: Gai komunak demokratizatzeko, urratsez urrats
        text: 'Prozesuak partaidetza-prozesuak sortzeko, aktibatzeko/desaktibatzeko eta kudeatzeko espazio bat dira. Hauek beste espazioetatik bereizten dira, osagai guztiak sar daitezkeen fase ezberdinetan egituratzen direlako. Partaidetza-prozesuen adibideak honako hauek dira: batzorde bateko kideak hautatzeko prozesua, aurrekontu parte-hartzaileak, plangintza estrategikoko prozesua, arau edo arau bat elkarlanean idaztea, hiri-espazio bat diseinatzea edo politika publikoen plan bat sortzea.'
        title: Partaidetza-prozesuak
      feature10:
        subtitle: Elkarrekin aztertu, sintetizatu eta eraikitzeko
        text: Testu luzeko dokumentuak hainbat proposamen edo emaitza bihurtzeko balio dezake, eta, alderantziz, proposamen edo emaitza multzo batean oinarritutako testu bateratu bat osatu eta erakusteko.
        title: Collaborative texts
      feature11:
        label: Conferences
        subtitle: Non ekitaldi handiak estreinatzen diren
        text: Webgune bat sortu ekitaldi handi baterako. Programa bateratzea, aurrez zehaztutako bilera batzuetan izena emanez (txatak, tailerrak, etab.), eta bertaratutakoak kudeatzea.
        title: Conferences
      feature12:
        subtitle: Zure komunitatearen iritzia garrantzitsua delako
        text: Inkestak diseinatu eta argitaratzea. Emaitzak erakutsi eta deskargatu.
        title: Inkestak
      feature13:
        subtitle: Berdintasuna eta ausazkotasunaren justizia
        text: Hainbat proposamen hautatzeko aukera ematen du (adibidez, epaimahaikide izateko hautagaiak) ausazko prozedura erreproduzitzaileekin, banaketa ez-partzialak eta uniformeak bermatzen dituztenak.
        title: Zozketak
      feature14:
        subtitle: Adimen kolektiboa sortu
        text: Erabiltzaileei aukera ematen die iruzkinak gehitzeko, aldeko, kontrako edo neutraleko balorazioak egiteko, bozkatzeko, erantzuteko eta erantzunei buruzko jakinarazpenak jasotzeko.
        title: Iruzkinak
      feature15:
        subtitle: Zure komunitatea, informatuta eta eguneratuta
        text: Sortu informazio-orriak testu-formatu aberatsak erabiliz, irudiak eta bideoak txertatuta. Blogaren osagaiak posta edo albisteak sortzea ahalbidetzen du, eta kronologikoki nabigatzea.
        title: Orriak eta blokak
      feature16:
        subtitle: Eduki interesgarriei buruzko informazio pertsonalizatua
        text: Decidim-ek edozein espazio edo osagairen jarraipena egiteko aukera ematen du, eguneratzeak jaso ahal izateko.
        title: jakinarazpenak
      feature17:
        subtitle: Sinplea, baina boteretsua
        text: Bidali mezu elektronikoak plataforman izena emanda dauden guztiei edo espazio jakin batean parte hartzen dutenei.
        title: Buletina
      feature18:
        subtitle: To promote community deliberation
        text: Ask a question about any topic related to a process, receive comments, participate in discussion threads and close the debate with a conclusion.
        title: Debates
      feature19:
        subtitle: Democratic and transparent decision-making
        text: Add your project proposal about your city district, vote and give support to those that resonate with you, co-create collective ideas and give a specific amount of money to each one. 
        title: Aurrekontu parte-hartzaileak
      feature2:
        label: Batzarrak
        subtitle: Autoantolaketa kolektiboaren boterea
        text: Erabakiak hartzeko organoak edo taldeak (kontseiluak, lantaldeak, batzordeak, etab.) eratzeko aukera ematen du, aldian-aldian biltzen direnak, haien osaera zehaztuz, haien bilerak zerrendatuz eta geolokalizatuz. Horietan parte hartzeko aukera ematen du, adibidez, aurrez aurre edo online, agendari gaiak gehituz, edo organo horrek hartzen dituen proposamenak eta erabakiak komentatuz.
        title: Batzarrak
      feature20:
        subtitle: Simple and user-friendly voting processes
        text: Set up elections to support decision-making. Upload your census or activate a token system for voting. Participants cast their votes through a secure voting booth, and once voting closes, you can publish the results.
        title: Elections
      feature3:
        subtitle: Erabaki zure aukera
        text: 'Offer organisations the possibility of activating different voting systems around proposals: unlimited, limited to a given threshold, cost-based, etc.'
        title: Conferences
      feature4:
        label: Ekimenak
        subtitle: Guztion agenda denon eskura jartzea
        text: Parte-hartzaileek lankidetza-ekimenak sor ditzakete, beren bidea eta helburuak zehaztu, abalak bildu, eztabaidatu eta ekimenak zabaldu, topaguneak jarri bertaratutakoen sinadurak biltzeko edo erakundeko beste kide batzuei irekitako eztabaidak egiteko.
        title: Ekimenak
      feature5:
        subtitle: Zure ideien xehetasunak
        text: Sormen-azti bat erabiliz proposamen bat sortzea, lehendik daudenekin alderatzea, plataforman argitaratzea eta informazio gehigarria sartzea, hala nola geolokalizazioa edo erantsitako dokumentuak eta irudiak. Osagai honek, gainera, aukera ematen du proposamen multzo batekin nabigatzeko, iragazteko eta elkarrekintzan aritzeko. Gainera, inkubagailuarekin proposamen kolaboratiboak egin daitezke.
        title: Proposamenak
      feature6:
        subtitle: Erabaki zure aukera
        text: 'Erakundeei aukera ematen die boto edo laguntza sistema desberdinak aktibatzeko proposamenen inguruan: mugagabeak, atalase jakin batera mugatuak, haztatuak, kostuetan oinarrituak, etab. Boto elektronikoaren teknologia seguru eta zifratuak babestuta.'
        title: Bozketa
      feature7:
        subtitle: Erantzunik gabeko proposamenik ez
        text: Guztion agenda denon eskura jartzea.
        title: Emaitzak
      feature8:
        subtitle: Gardentasuna azken muturreraino
        text: Keep participants informed of the status of implementation. Based on the proposals, define results, create and apply progress reports on their implementation, and show the degree to which the results have been achieved.
        title: Emaitzak
      feature9:
        subtitle: Elkar ezagutzeko eta ezer ez galtzeko
        text: Bilera-osagaiak aukera ematen die erakundeei eta parte-hartzaileei bileretarako deialdia egiteko, bileretako lekua eta ordua zehazteko, bertaratuak erregistratzeko eta mugatzeko, bileraren egitura eta edukia zehazteko eta aktak eta ondoriozko proposamenak argitaratzeko.
        title: Topaketa-zerrenda
    section3:
      text: Thanks to its modular architecture and scalable logic, you can configure a powerful system of democratic participation in all kinds of organizations. Choose the features that best suit your needs and customise your participatory process.
      title: A <span class="text-red-500">customizable system</span> for <br/>participation
    section4:
      link: Try our online demo
      title: Want to play and see how it works in a real-world environment?
    subtitle: The platform for democratic organisations and communities of any size and kind.
    title: Funtzionalitateak
    type1:
