  partnership-policy:
    explanation:
      p1: La maintenance de Decidim demande du temps et des ressources. Plusieurs tâches doivent être gérées, telles que l'examen des contributions, le triage des issues Github, la correction des bugs, la rédaction de la documentation et la réponse aux doutes partagés par la communauté. Toute organisation (entreprise, association, ou collectif) ayant la volonté de devenir partenaire de Decidim s'engage à contribuer à l'Association Decidim à hauteur de 3 % du revenu annuel généré par les activités de Decidim. Dans le cas des organisations sans but lucratif, ces frais sont de 1,5 %.
      p2: Chaque partenaire Decidim sera mis en avant sur le <a href="%{main_website_url}">site principal de Decidim</a> et la<a href="%{readme_url}">page README du projet GitHub</a>. De plus, l'association Decidim valorisera les partenaires Decidim dans nos conférences et conversations emails au sujet de la fourniture de service autour de Decidim.
      p3: Afin de soutenir les organisations récemment constituées, les partenaires Decidim seront exemptés de toute contribution économique au cours de leur première année pour leur laisser le temps d'élaborer leur modèle économique avec Decidim. En attendant, nous recommandons aux partenaires Decidim de trouver d'autres moyens de contribuer au projet (comme le signalement de bugs, la contribution à la documentation, la participation et soutien aux activités communautaires, etc.).
    how_to:
      steps:
        step1: Envoyez un email à associacio [arobase] decidim [point] org avec vos coordonnées et indiquez dans le sujet que vous voulez devenir un partenaire Decidim.
        step2: Nous vous contacterons pour une vidéoconférence afin d'évaluer la candidature.
        step3: Si la candidature est approuvée, le Comité de Coordination vous enverra chaque année une déclaration assermentée à remplir et renvoyer avec la réception du virement bancaire correspondant.
      title: Comment devenir un partenaire Decidim ?
    requirements:
      l1: Gestion d'instances. Gérer une ou plusieurs installations actives de Decidim au moment de la candidature, pour sa propre utilisation ou pour des tierces parties.
      l2: Contributions au projet. Contribuer ou avoir contribué de façon significative au projet Decidim.
      p1: 'Vous devez accepter de remplir et de signer le <a href="%{social_contract_url}">Contrat Social</a> et remplir l''une des conditions suivantes pour être membre :'
      p2: Vous pouvez lire en détail dans l'assemblée <a href="%{metadecidim_partners_url}">Metadecidim</a>.
      title: Quelles sont les exigences auxquelles mon organisation doit satisfaire pour devenir partenaire?
    subtitle: Si votre organisation veut soutenir Decidim, vous pouvez devenir un partenaire Decidim.
    title: Politique de partenariat
