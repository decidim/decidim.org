    title: Merci pour votre e-mail
  trademark:
    examples-1:
      l1: Inclure le logo Decidim sur les pages produits pour dire "nous travaillons avec Decidim" (par exemple, hébergement, services de conseil, développements basés sur Decidim).
      l2: Utilisation de la marque de commerce "Decidim" dans les titres de livres et les articles de recherche.
      l3: Utilisation du logo Decidim dans le pied de page d'une instance (« Propulsé par Decidim »).
      title: Exemples d'utilisation qui n'ont pas besoin de permission
    examples-2:
      l1: Vendre des marchandises (autocollants, t-shirts, tasses, etc).
      l2: Utilisation du logo Decidim sur une couverture du livre.
      l3: L'utilisation du logo Decidim dans l'en-tête dans un site web, impliquant que vous êtes l'organisation Decidim.
      title: Exemples d'utilisation qui ont besoin de permission
    examples-3:
      l1: Nommer votre entreprise ou produit après Decidim, comme "Les Consultants Decidim".
      title: Exemples d'utilisation qui n'obtiendront pas la permission
    goals:
      l1: Nous aimerions faciliter l'utilisation du nom ou du logo Decidim pour des efforts orientés vers la communauté qui aident à diffuser et à améliorer Decidim.
      l2: Nous aimerions clarifier comment les entreprises et les projets liés à Decidim peuvent (ou ne peuvent pas) utiliser le nom et le logo Decidim.
      l3: Nous aimerions rendre la tâche difficile à quiconque d'utiliser le nom et le logo Decidim pour en tirer un profit injuste, tromper ou induire en erreur les personnes qui recherchent des ressources officielles de Decidim.
    p1: '"Decidim" et le logo Decidim sont des marques déposées de Associació de Software Lliure Decidim. Vous ne pouvez pas utiliser ces marques dans un cadre commercial pour affirmer que votre produit ou service est avalisé ou associé à Decidim sans autorisation. Vous pouvez utiliser ces marques pour faire référence à Decidim d''une manière où il est clair que vous faites simplement référence au projet, ne réclamant ni soutien ni association.'
    p2: 'Si vous utilisez le logo Decidim d''une manière ou d''une autre, vous devez ajouter le texte suivant : <i>"Le nom et le logo Decidim sont une marque déposée de l''Association du Logiciel Libre Decidim."</i>'
    p3: 'Nous avons développé cette politique d''utilisation des marques avec les objectifs suivants en tête :'
    p4: Vous pouvez demander la permission en envoyant un courriel à associacio@decidim.org.
    p5: Cette page de politique de marque était basée sur <a href="%{rails_url}">Ruby on Rails</a> et <a href="%{wordpress_url}">la Fondation Wordpress</a>.
    title: Politique de marque commerciale
