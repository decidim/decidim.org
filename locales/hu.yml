  feature_cards:
    meetings:
      f3: Organize face-to-face or online <strong>meetings</strong>, manage registrations, and publish the agenda.<br> And much more!
    proposals:
      f1: Collect <strong>proposals</strong> from participants, enriched with geolocation and attachments, merge similar ones, and set a workflow for official approval or rejection.
    voting:
      f2: Prioritize proposals using various <strong>voting</strong> methods, such as setting minimum and maximum thresholds, weighted voting, or participatory budgeting.
  features:
    component_groups:
      group_1:
        title: Receive Contributions
      group_2:
        title: Discuss and deliberate
      group_3:
        title: Make Decisions
      group_4:
        title: Communicate Results to your audience
    intro: You can use the Decidim software in a public or private organisation, with hundreds or thousands of potential participants, such as a city council, public institution, associations, NGOs, universities, trade unions, cooperatives or neighbourhood communities. With Decidim you will be able to configure spaces for digital participation and organize contributions and discussions through the multiple available components.
    modules:
      button: Kezdjük el
      intro: Grow beyond the default components.
      subtitle: The Decidim community has developed hundreds of modules to expand the platform beyond the basics and cater to your needs even better.
      title: Modulok
    need_help:
      button: Partnerek
      subtitle: Take a look at the partners community, Decidim official service providers that can assist you on the installation journey, the hosting and maintenance of your platform.
      title: Need help in the installation?
    page:
      feature1:
        label: Részvételi folyamatok
        subtitle: A közös ügyek demokratizálása, lépésről lépésre
        text: 'A folyamatok egy olyan tér, amely lehetővé teszi különböző részvételi folyamatok létrehozását, aktiválását/deaktiválását és kezelését. Ezeket az különbözteti meg más terektől, hogy különböző fázisokra tagolódnak, amelyeken belül az összes komponens beépíthető. A részvételi folyamatok példái: egy bizottság tagjainak választási folyamata, részvételi költségvetés-tervezés, stratégiai tervezési folyamat, egy rendelet vagy norma közös megírása, egy városi tér kialakítása vagy egy közpolitikai terv elkészítése.'
        title: Részvételi folyamatok
      feature10:
        subtitle: Elemezni, szintetizálni, és közösbe építeni
        text: Használható hosszú szöveges dokumentumok több javaslattá vagy eredménnyé alakítására, és fordítva, egységes szöveg összeállítására és megjelenítésére javaslatok vagy eredmények gyűjteménye alapján.
        title: Collaborative texts
      feature11:
        label: Conferences
        subtitle: Ahol a nagy események premierjét tartják
        text: Készítsen weboldalt egy nagy eseményhez. Egységesítse a programot egy sor előre meghatározott találkozó (beszélgetések, workshopok stb.) összekapcsolásával, és kezelje a résztvevőket.
        title: Conferences
      feature12:
        subtitle: Mert a közösség véleménye számít
        text: Felmérések tervezése és közzététele. Az eredmények megjelenítése és letöltése.
        title: Felmérések
      feature13:
        subtitle: Az egyenlőség és a véletlen igazságossága
        text: Lehetővé teszi számos javaslat (pl. zsűrijelöltek) véletlenszerű, de reprodukálható eljárással történő kiválasztását, amely garantálja az elfogulatlan és egyenletes eloszlást.
        title: Sorsolás
      feature14:
        subtitle: A kollektív intelligencia kiépítése
        text: Lehetővé teszi a felhasználók számára, hogy megjegyzéseket adjanak hozzá, értékeljék azokat támogató, ellenző vagy semleges módon, szavazzanak rájuk, válaszoljanak rájuk, és értesítést kapjanak a válaszokról.
        title: Hozzászólások
      feature15:
        subtitle: Az Ön közössége, tájékozott és naprakész
        text: Informatív oldalak létrehozása gazdag szövegformázással, beágyazott képekkel és videókkal. A blog komponens lehetővé teszi a bejegyzések vagy hírek létrehozását, és azok kronologikusan történő navigálását.
        title: Oldalak és blogok
      feature16:
        subtitle: Személyre szabott információk az érdekes tartalmakról
        text: A Decidim lehetővé teszi, hogy bármilyen helyet vagy komponenst nyomon kövessen, így bármikor megkaphatja a frissítéseket, amikor azok megtörténnek.
        title: Értesítések
      feature17:
        subtitle: Egyszerű, de erős
        text: Küldjön e-maileket mindenkinek, aki regisztrált a platformon, vagy azoknak, akik részt vesznek egy adott térben.
        title: Hírlevél
      feature18:
        subtitle: To promote community deliberation
        text: Ask a question about any topic related to a process, receive comments, participate in discussion threads and close the debate with a conclusion.
        title: Debates
      feature19:
        subtitle: Democratic and transparent decision-making
        text: Add your project proposal about your city district, vote and give support to those that resonate with you, co-create collective ideas and give a specific amount of money to each one. 
        title: Részvételi költségvetés-tervezés
      feature2:
        label: Gyűlések
        subtitle: A kollektív önszerveződés ereje
        text: Lehetővé teszi döntéshozó testületek vagy csoportok (tanácsok, munkacsoportok, bizottságok stb.) létrehozását, amelyek rendszeresen üléseznek, részletezve összetételüket, felsorolva és földrajzi elhelyezkedésüket. Lehetővé teszi a részvételt, például a személyes vagy online részvétel, a napirendhez való hozzászólás, illetve a testület által tett javaslatok és döntések véleményezése.
        title: Gyűlések
      feature20:
        subtitle: Simple and user-friendly voting processes
        text: Set up elections to support decision-making. Upload your census or activate a token system for voting. Participants cast their votes through a secure voting booth, and once voting closes, you can publish the results.
        title: Elections
      feature3:
        subtitle: Döntse el a választását
        text: 'Offer organisations the possibility of activating different voting systems around proposals: unlimited, limited to a given threshold, cost-based, etc.'
        title: Conferences
      feature4:
        label: Kezdeményezések
        subtitle: Mindenki napirendjének meghatározása, mindenki számára elérhető közelségben
        text: A résztvevők közös kezdeményezéseket hozhatnak létre, meghatározhatják útjukat és céljaikat, támogatókat gyűjthetnek, megbeszélhetik, megvitathatják és terjeszthetik a kezdeményezéseket, találkozási pontokat határozhatnak meg, ahol a résztvevők aláírásait lehet gyűjteni, vagy a szervezet más tagjai számára nyitott vitákat rendezhetnek.
        title: Kezdeményezések
      feature5:
        subtitle: Az Ön elképzelései részletesen
        text: Létrehozhat egy javaslatot egy “varázsló” segítségével, összehasonlíthatja a már meglévőkkel, közzéteheti a platformon, és további információkat, például földrajzi elhelyezkedést vagy dokumentumokat és képeket csatolhat hozzá. Ez a komponens lehetővé teszi az javaslatok között való navigálást, szűrést és interakciót is. A javaslat-inkubátorral emellett kollaboratív javaslatokat is létrehozhat.
        title: Javaslatok
      feature6:
        subtitle: Döntse el a választását
        text: 'Lehetőséget kínál a szervezeteknek arra, hogy különböző szavazási vagy támogatási rendszereket aktiváljanak a javaslatok körül: korlátlan, egy adott küszöbértékre korlátozott, súlyozott, költségalapú, stb. Biztonságos és titkosított e-szavazási technológiával támogatva.'
        title: Szavazás
      feature7:
        subtitle: Nincs javaslat válasz nélkül
        text: A javaslatok eredményre váltása és hivatalos válaszok adása azok elfogadásáról vagy elutasításáról, a különböző javaslatok egyetlen eredménybe történő összevonása.
        title: Eredmények
      feature8:
        subtitle: Végponttól végpontig tartó átláthatóság
        text: Keep participants informed of the status of implementation. Based on the proposals, define results, create and apply progress reports on their implementation, and show the degree to which the results have been achieved.
        title: Elszámoltathatóság
      feature9:
        subtitle: Találkozni és nem lemaradni semmiről
        text: A találkozó komponens lehetőséget biztosít a szervezeteknek és a résztvevőknek a találkozók összehívására, azok helyének és idejének meghatározására, a résztvevők regisztrálására és korlátozására, a találkozó szerkezetének és tartalmának meghatározására, valamint a jegyzőkönyvek és az abból származó javaslatok közzétételére.
        title: Találkozók
    section3:
      text: Thanks to its modular architecture and scalable logic, you can configure a powerful system of democratic participation in all kinds of organizations. Choose the features that best suit your needs and customise your participatory process.
      title: A <span class="text-red-500">customizable system</span> for <br/>participation
    section4:
      link: Try our online demo
      title: Want to play and see how it works in a real-world environment?
    subtitle: The platform for democratic organisations and communities of any size and kind.
