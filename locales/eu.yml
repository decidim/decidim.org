  partnership-policy:
    explanation:
      p1: Decidim mantentzeko denbora eta baliabideak behar dira. Hainbat zeregin kudeatu behar dira, hala nola ekarpenak berrikustea, arazoak konpontzea, akatsak konpontzea, dokumentazioa idaztea eta komunitateak partekatzen dituen zalantza orokorrei erantzutea. Decidim Bazkide izateko prest dagoen edozein erakundek (enpresa, elkarte edo kolektibo) konpromisoa hartzen du Decidim Elkarteari Decidim jarduerak sortutako urteko diru-sarreren % 3ko kuota murriztuarekin laguntzeko. Irabazi-asmorik gabeko erakundeen kasuan, tasa hori % 1,5ekoa da.
      p2: Decidim bazkide guztiak jendaurrean jarriko dira <a href="%{main_website_url}">Decidim webgune nagusian</a> eta <a href="%{readme_url}">GitHub proiektuaren README orrian</a>. Gainera, Decidim Elkarteak Decidim-en tokiko inplementatzailea gomendatuko du gure hitzaldietan eta posta elektronikoko elkarrizketetan.
      p3: Duela gutxi sartu diren erakundeei laguntzeko, Decidim-en tokiko inplementatzaileak ez du ekarpen ekonomikorik egin beharko lehen urtean Decidim-ekin beren negozio-plana lehen aldiz garatzeko. Bitartean, Decidim tokiko inplementatzaileek proiektuari laguntzeko beste modu batzuk bilatzea gomendatzen dugu (akats-txostenak egitea, dokumentazioa, komunitateko jardueretan parte hartzea eta laguntzea, etab.).
    how_to:
      steps:
        step1: Bidali mezu bat elkartera zure harremanetarako informazioarekin eta adierazi gaian Decidim-en tokiko inplementatzaile bihurtu nahi dudala.
        step2: Bideokonferentzia bat egingo dugu hautagaitza baloratzeko.
        step3: Hautagaitza onartzen bada, Koordinazio Batzordeak zinpeko adierazpen bat bidaliko dizu urtero, bete dezazun eta dagokion banku-transferentzia jasotzearekin batera itzul dezazun.
      title: Nola bihurtu Decidim-en tokiko inplementatzaile?
    requirements:
      l1: Eskabideak kudeatzea. Eskaera egiten den unean Decidim-eko instalazio aktibo bat edo batzuk kudeatzea, erakundearen edo hirugarrenen erabilera propiorako.
      l2: Proiekturako ekarpenak. Decidim proiektuan ekarpen esanguratsua egitea edo egin izana.
      p1: '<a href="%{social_contract_url}"> Kontratu oziala</a> betetzea eta sinatzea onartu behar duzu, eta, gainera, honako baldintza hauetakoren bat bete behar duzu:'
      p2: Metadecidim <a href="%{metadecidim_partners_url}">batzarrean</a>irakur dezakezu zehatz-mehatz.
      title: Zein baldintza bete behar ditu nire erakundeak tokiko inplementatzailea izateko?
