## In order to access the Sevilta CMS for local development, you need to run alongside the middleman server:
##
## npx netlify-cms-proxy-server
##
## Access to the CMS admin area is avaliable via http://localhost:4567/admin
## Note: Access to the admin area is restricted only to the Google Chrome browser.

local_backend: true

backend:
  name: github
  repo: decidim/decidim.org
  branch: inuse/case-studies
media_folder: "source/uploads"
public_folder: "/uploads/"
collections:
  - name: "case_studies"
    label: "Case studies"
    format: "yaml-frontmatter"
    extension: "html.md"
    folder: "source/case_studies/en"
    create: true
    identifier_field: title
    fields:
      - {label: "Title", name: "title", widget: "string", required: true}
      - {label: "Subtitle", name: "subtitle", widget: "text", required: true}
      - {label: "Website", name: "website", widget: "string", type: "url", required: false}
      - {label: "Website Link Text", name: "website_link_text", widget: "string", required: false, hint: "Leave blank to use the URL as link text"}
      - label: "Gallery"
        name: "gallery"
        widget: "list"
        required: false
        fields:
          - {label: "Image", name: "image", widget: "image", required: true}
          - {label: "Alt text", name: "alt", widget: "string", required: false}
      - {label: "Type", name: "type", widget: "select", options: ["Participatory Budgeting", "Strategic Planning", "Participatory Policy-Making", "Citizen Petitions", "Organizations", "Climate Policies"], required: true}
      - {label: "Target public", name: "target", widget: "string", required: true}
      - label: "Components used"
        name: "components_used"
        widget: "list"
        required: false
        hint: "Add each component as a separate item"
        field: {label: "Component", name: "component", widget: "string"}
      - {label: "Country", name: "country", widget: "select", options: ["Brazil", "Catalonia", "Europe", "Finland", "Japan"], required: true}
      - label: "Results section title"
        name: "results_title"
        widget: "string"
        required: false
        hint: "Leave blank to use default: 'Results'"
      - label: "Budget allocated"
        name: "budget"
        widget: "object"
        required: false
        fields:
          - {label: "Value", name: "value", widget: "string", required: false, hint: "e.g. '30 Millions €'"}
          - {label: "Label", name: "label", widget: "string", required: false, hint: "Leave blank to use default: 'Budget allocated'"}
      - label: "Proposals submitted"
        name: "proposals_submitted"
        widget: "object"
        required: false
        fields:
          - {label: "Value", name: "value", widget: "string", required: false, hint: "e.g. '1,982'"}
          - {label: "Label", name: "label", widget: "string", required: false, hint: "Leave blank to use default: 'Proposals submitted'"}
      - label: "Technically validated"
        name: "technically_validated"
        widget: "object"
        required: false
        fields:
          - {label: "Value", name: "value", widget: "string", required: false, hint: "e.g. '823'"}
          - {label: "Label", name: "label", widget: "string", required: false, hint: "Leave blank to use default: 'Technically validated'"}
      - label: "Prioritized"
        name: "prioritized"
        widget: "object"
        required: false
        fields:
          - {label: "Value", name: "value", widget: "string", required: false, hint: "e.g. '204'"}
          - {label: "Label", name: "label", widget: "string", required: false, hint: "Leave blank to use default: 'Prioritized'"}
      - label: "Selected for implementation"
        name: "selected_for_implementation"
        widget: "object"
        required: false
        fields:
          - {label: "Value", name: "value", widget: "string", required: false, hint: "e.g. '76'"}
          - {label: "Label", name: "label", widget: "string", required: false, hint: "Leave blank to use default: 'Selected for implementation'"}
      - label: "Total participants"
        name: "total_participants"
        widget: "object"
        required: false
        fields:
          - {label: "Value", name: "value", widget: "string", required: false, hint: "e.g. '40,000'"}
          - {label: "Label", name: "label", widget: "string", required: false, hint: "Leave blank to use default: 'Total participants'"}
      - {label: "Results conclusion", name: "results_conclusion", widget: "markdown", required: false}
      - {label: "Description Title", name: "description_title", widget: "string", required: true}
      - {label: "Description", name: "description", widget: "markdown", required: true}
      - {label: "Process title", name: "process_title", widget: "string", required: false}
      - {label: "Process subtitle", name: "process_subtitle", widget: "string", required: false}
      - label: "Phases"
        name: "phases"
        widget: list
        required: false
        fields:
          - { label: Phase Title, name: title, widget: string }
          - { label: Count Label, name: count_label, widget: string, required: false, hint: "e.g. '1,982 proposals'" }
          - { label: Body, name: body, widget: markdown, required: false }
          - label: "Components"
            name: "components"
            widget: list
            required: false
            fields:
              - { label: Description, name: description, widget: markdown }
      - {label: "Phases Conclusion", name: "phases_conclusion", widget: "markdown", required: false}
      - {label: "Banner title", name: "banner_title", widget: "string", required: true}
      - {label: "Banner subtitle", name: "banner_subtitle", widget: "string", required: true}
      - {label: "Banner", name: "banner", widget: "markdown", required: true}
      - {label: "Optional Section 1 Title", name: "optional_section_1_title", widget: "string", required: false}
      - {label: "Optional Section 1", name: "optional_section_1", widget: "markdown", required: false}
      - {label: "Optional Section 2 Title", name: "optional_section_2_title", widget: "string", required: false}
      - {label: "Optional Section 2", name: "optional_section_2", widget: "markdown", required: false}
      - {label: "Optional Section 3 Title", name: "optional_section_3_title", widget: "string", required: false}
      - {label: "Optional Section 3", name: "optional_section_3", widget: "markdown", required: false}
      - {label: "Testimonial", name: "testimonial", widget: "markdown", required: false, hint: "Add testimonial content with links, embedded videos, or other rich content"}
      - label: "Partners"
        name: "partners"
        widget: "list"
        required: false
        fields:
          - {label: "Logo", name: "logo", widget: "image", required: true}
          - {label: "Name", name: "name", widget: "string", required: true}
      - {label: "Collaboration text", name: "collaboration_text", widget: "markdown", required: false}
  - name: "settings"
    label: "Settings"
    description: >
      Here you can enable and disable the Alert and change the URL.
      For changing the messages (title, description and button), you need to do it in
      <a href="https://github.com/decidim/decidim.org/blob/main/locales/en.yml">GitHub</a>
      and <a href="https://crowdin.com/project/decidimorg">Crowdin</a>.
    editor:
      preview: false
    files:
      - name: "alert"
        label: "Alert"
        file: "data/alert.yml"
        fields:
          - { label: 'Enabled', name: 'enabled', widget: 'boolean', default: true, required: true}
          - { label: 'URL', name: 'url', widget: 'string', required: true, pattern: ['.{12,}^(http|https)://', "Must be an URL and starts with http:// or https://"]  }
  - name: "post"
    label: "Post"
    folder: "source/blog/en"
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}} -- {{year}}-{{month}}-{{day}}"
    extension: "html.md"
    format: "yaml-frontmatter"
    create: true
    fields:
      - {label: "Title", name: "title", widget: "string", tagname: "h1", required: true}
      - {label: "Body", name: "body", widget: "markdown", required: true}
      - {label: "Tags", name: "tags", widget: "select", options: ["releases", "casestudy"], required: false}
  - name: "Partners"
    label: "Partner"
    format: yml
    extension: yml
    folder: data/partners/
    create: true
    identifier_field: name
    fields:
      - {label: "Name", name: "name", widget: "string", required: true}
      - {label: "URL", name: "url", widget: "string", required: true}
      - {label: "Image", name: "image", widget: "image", required: true}
      # Maybe after these are fixed this can work as it should according to their docs:
      # * https://github.com/decaporg/decap-cms/pull/7091
      # * https://github.com/decaporg/decap-cms/issues/7090
      #
      # - {label: "Joined at", name: "joined_at", widget: "datetime", date_format: "YYYY.MM.DD", time_format: false, required: true}
      # In the meantime we use a string as a workaround
      - {label: "Joined at", name: "joined_at", widget: "string", default: "YYYY.MM.DD", required: true}
      - {label: "Type", name: "type", widget: "select", options: ["public", "provider", "other"], required: false}
  - name: "installation"
    label: "Installation"
    format: yml
    extension: yml
    folder: data/installations/
    create: true
    fields:
      - {label: "Title", name: "title", widget: "string", required: true}
      - {label: "URL", name: "url", widget: "string", required: true}
      - {label: "Image", name: "image", widget: "image", required: true}
      - {label: "Home Image", name: "home_image", widget: "image", required: false}
      - {label: "Type", name: "type", widget: "select", options: ["city", "org", "region", "university"], required: true}
      - {label: "Priority", name: "priority", widget: "number", default: 50, value_type: "int", min: 1, max: 101, step: 2, hint: Larger number is more priority (100 is Barcelona), required: true}
      - {label: "Home", name: "home", widget: "boolean", hint: "Is it going to be published on homepage?", required: false}
      - {label: "Location", name: "location", widget: "map", type: "Point", hint: "Geographical location for this installation", required: false}
  - name: "Module"
    label: "Module"
    format: yml
    extension: yml
    folder: data/modules/
    create: true
    fields:
      - {label: "Title", name: "title", widget: "string", required: true}
      - {label: "URL", name: "url", widget: "string", required: true}
      - {label: "Image", name: "image", widget: "image", required: false}
      - {label: "Description", name: "description", widget: "text", required: true}
      - {label: "Type", name: "type", widget: "select", options: ["official", "community", "auth"], required: true}
  - name: "media-highlights"

    label: "Media highlights"
    format: yml
    extension: yml
    folder: data/media/
    create: true
    fields:
      - {label: "Title", name: "title", widget: "string", required: true}
      - {label: "URL", name: "url", widget: "string", required: true}
      - {label: "Source", name: "source", widget: "string", required: true}
