  legal-notice:
    section-1:
      paragraph: '<p>You are accessing the website of Associació de Software Lliure Decidim ("Decidim", "Us" or "We") available through the web domain <a href="https://decidim.org">https://decidim.org/</a> (hereinafter, the "Website"), domiciled in Carrer Concepción Arenal 165, Number 165, Canòdrom - Ateneu d''Innovació Digital i Democràtica, Barcelona, postal code 08027, Spain and ID number G67401174.</p><p><b>You can contact us at: <a href="mailto:hola@decidim.org">hola@decidim.org</a></b></p> '
      title: Quem somos
    section-2:
      paragraph: "<p>O propósito deste site é fornecer informações gerais ao público sobre o Decidim, suas atividades e tecnologia, consistindo em uma plataforma de democracia participativa gratuita e de código aberto para cidades e organizações, e a gestão da comunidade Decidim gerada em todo o mundo a partir da nossa tecnologia colaborativa, permitindo o desenvolvimento de projetos cidadãos e associativos com maior participação social. Você pode testar livremente a plataforma Decidim com nossa demonstração on-line.</p> <p>A finalidade dos termos de uso deste Aviso Legal é regular o uso permitido deste site e dos serviços e/ou conteúdos hospedados de acordo com a Lei 34/2002 sobre Serviços da Sociedade da Informação e Comércio Electrónico e outras disposições legais aplicáveis.</p>"
      title: Propósito
    section-3:
      paragraph: '<p>O acesso a este site é gratuito. Nenhum formulário de aplicação é necessário para navegar pelas informações e/ou conteúdos deste site em termos gerais. Caso contrário, por favor, consulte a nossa <a href="%{privacy_policy_url}">Política de Privacidade</a>.<p> <p>Ao acessar e usar o site, você está aceitando os termos de uso deste Aviso legal e se compromete a fazer adequadamente a utilização legal e diligente do site e, em particular: (i) utilize o site para os fins pretendidos, ou seja, informações sobre nossos serviços, você se absterá de usar o site ou o seu conteúdo para fins ilegais ou para fins que vão contra a ordem pública, a moralidade e os bons costumes; (ii) respeitam os direitos de propriedade intelectual e industrial do site e do seu conteúdo, bem como todos os direitos que correspondem ao Decidim; (iii) não reproduzir, copiar, converter, modificar, distribuir, exibir publicamente ou disponibilizar ao público o site ou qualquer um de seu conteúdo ou qualquer modificação dele; (iv) Você será responsável por qualquer perda ou dano sofrido pelo Decidim devido a uma má utilização direta ou indirecta por você do site, as cláusulas dos "Textos Jurídicos" (mencionados coletivamente, este Aviso Jurídico e a <a href="%{privacy_policy_url}">Política de Privacidade</a>) e a legislação aplicável.<p>'
      title: Uso do site
    section-4:
      paragraph: "<p>Todos os direitos de propriedade intelectual sobre o conteúdo deste site, incluindo, mas não limitado a, imagens, marcas, logotipos, sinais distintivos, sons e animações, textos, áudios, gravações visuais ou audiovisuais e bancos de dados são de propriedade do Decidim ou de seus licenciantes e são protegidos por leis nacionais e internacionais. Tais direitos são reservados a favor do Decidim e/ou seus licenciadores. A reprodução, cópia, comunicação pública, distribuição, modificação, transformação, eliminação, manipulação e qualquer outro uso, incluindo a extração e reutilização, seja com fins lucrativos ou não, direto ou indireto, temporário ou permanente, de todo ou parte deste site ou qualquer um dos seus conteúdos, é expressamente proibida sem a prévia autorização expressa por escrito da Decidim. Podemos tomar todas as medidas legais e/ou extrajudiciais que julgarmos adequadas no caso de uma possível violação desses direitos.</p>"
      title: Propriedade Industrial e Intelectual
    section-5:
      paragraph: "<p>O Decidim não é responsável por páginas web de terceiros que podem ser acessadas a partir do site, nem para a precisão, veracidade e validade das informações no site que não sejam de sua própria elaboração. No entanto, nos termos do artigo 17 da Lei 34/2002, no caso de o Decidim tomar consciência da ilegalidade de tal conteúdo ou links, ele se compromete a removê-los ou desativá-los bem como, quando apropriado, bloquear qualquer conteúdo que possa ser ilegal ou violar os direitos de terceiros, de acordo com os artigos 11 e 16 da referida lei.</p> <p>Além disso, o Decidim não é responsável por qualquer dano que possa ocorrer devido a falhas ou erros de configuração no navegador instalado pelo usuário em seu computador. O Decidim não é responsável por nenhum incidente ou falha técnica causada pela conexão do usuário à Internet.</p> <p>O Decidim usará os seus melhores esforços para efetuar, no menor espaço de tempo, atualizações e correções de erros e deficiências, incluindo aqueles que ocorrem no acesso e/ou conexão ao site e/ou seu conteúdo, mas não garante a ausência de interrupções, erros na conexão e/ou acesso ao site e atualização do seu conteúdo.</p> <p>Você é responsável pelo seu uso e acesso ao site. O Decidim não será responsável pela presença de vírus nem por erros de segurança, nem pelos danos que possam ser causados em seus dispositivos ou pelos arquivos ou documentos armazenados em tais dispositivos para acesso e/ou conexão ao site, nem pelos danos causados a terceiros por meio de intromissões ilegais fora do controle do Decidim.</p> <p>O Decidim não se responsabiliza pelo incumprimento das suas obrigações que assume ao acessarr a este site que está contido nesta informação legal e, em particular, não será responsável por qualquer violação dos direitos de propriedade intelectual, direitos de autor, direitos de publicidade e imagem, ou qualquer outro direito em relação aos bens e direitos de terceiros.</p>"
      title: Responsabilidade
    section-6:
      paragraph: <p>O Decidim pode modificar este Aviso Legal, a <a href="%{privacy_policy_url}">Política de Privacidade</a> e/ou qualquer outro texto de natureza contratual aplicável a este site sem aviso prévio. Tais modificações serão eficazes no momento da sua publicação no site.</p> <p>O Decidim também poderá encerrar ou suspender os serviços do site a qualquer momento. Sempre que possível, o Decidim vai avisar/alertar anteriormente sobre tal término ou suspensão através deste site.</p>
      title: Modificações
    section-7:
      paragraph: <p>Seus dados pessoais coletados em nosso site ou quando você entra em contato conosco através do formulário de contato ou enviando um e-mail serão tratados estritamente de acordo com nossa <a href="%{privacy_policy_url}">Política de Privacidade</a>.</p>
      title: Dados Pessoais
    section-8:
      paragraph: <p>Esse site não usa cookies. Mais informações em nossa <a href="%{privacy_policy_url}">Política de Privacidade</a>.</p>
      title: Cookies
    section-9:
      paragraph: '<p>Nossos Textos Legais, incluindo essa Nota Legal e nossa <a href="%{privacy_policy_url}">Política de Privacidade</a>, são regidos pela lei espanhola. Os tribunais da cidade de Barcelona serão competentes para decidir qualquer litígio resultante da utilização de nosso site.</p> <p><b>Última atualização</b>: Fevereiro 2022.</p>'
