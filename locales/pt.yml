  testimonials:
    n1:
      org: Salão da Cidade do Barcelona (2015-2019)
      quote: '"Thanks to Decidim, in Barcelona we have managed to co-produce a strategic city plan together with the citizens. In 2016 we inaugurated the Municipal Action Plan in the form of a participatory process through Decidim Barcelona. Currently, this plan includes almost 7 thousand citizen proposals. One of the advantages of using this platform is that you can monitor at all times the state of implementation of the approved proposals."'
    n2:
      org: Energia do Som
      quote: '"With the implementation of Decidim in Som Energia we have generated a kinder space for participation. We released the tool in 2018, hosting the General Assembly of the Cooperative and months later we debated the Image Redesign and collaborative development of the School of Som Energia, among other participatory processes. In a few months, more than 3,500 participant people have registered, 5 participatory processes, 3 assemblies operating and more than 1,300 votes in the last General Assembly vote."'
    n3:
      org: City Council President of Mérida Yucatán, Mexico.
      quote: '"The Decide Mérida digital platform was an opportunity that opened as never before the mechanisms of citizen participation for the elaboration of the Municipal Development Plan of Mérida 2018-2021. We had more than 3,000 citizen interactions including proposals, comments, suggestions and support that achieving the highest consensus possible about what is best for our city. Undoubtedly, the Decide Mérida platform will continue to be our ally in making Mérida an increasingly participative society."'
    n4:
      org: Cidade de Helsínquia
      quote: '"What we appreciate is that it’s built with democracy in mind and therefore democracy is a big focus. Democratic principles such as accountability, equality and transparency are in the core of the design."'
    n5:
      org: Abrir Governo da Cidade do México
      quote: '"Almost every participatory process that has come to our table, we have been able to solve it using Decidim’s business rules. As a tool, it is a very strong one. However, the part that seems strongest and most important to us is its community, both developers and those who use it for participatory processes. Coexisting with them has made us appreciate the challenges involved in implementing participatory democracy in the real world."'
    n6:
      org: Fundação Mozilla
      quote: '"We suffer under a lack of public space. Its particularly important that we reclaim these public spaces for us. Open platforms such as Decidim do exactly that. Is not only that is open source so other people can fork it, reuse it and build a process. It also has these values that we want to reflect in our society encoded in the way it’s designed."'
    n7:
      org: Director Europeu de Investigação de Fórum Aberto, União Europeia
      quote: '"The process started in October 2019 at the European Commission’s DG Communication and eDemocracy unit at the Joint Research Centre, the European Commission’s science and knowledge service. An analysis of the needs of the Conference and which tools fit those, lead to choosing the open source tool Decidim for its technical maturity, broad community and adaptability."'
    n8:
      org: Pipeline to Power, trabalhando para a Comissão de Engajamento Civil NYC
      quote: '"Part of what makes Decidim so powerful is that it adds a level of abstraction to the work separating out  the steps of a process and the activities associated with the process. That’s part of the information architecture, so that not only you are saying what is happening at each step but different parts of Decidim behave differently depending on when you are doing or depending on what step in the process you are in. The fact that that’s customizable really allows Decidim to be moulded to how we are doing our work and not our work to be moulded."'
    title: Testimonials
  thanks:
    message: Obrigado por nos contatar, entraremos em contato em breve.
    title: Obrigado pelo seu e-mail
  trademark:
    examples-1:
      l1: Incluindo o logotipo Decidim nas páginas do produto para dizer "trabalhamos com o Decidim" (por exemplo, hospedagem, serviços de consultoria, desenvolvimento baseado no Decidim).
      l2: Uso da marca "Decidim" em títulos de livros e artigos de pesquisa.
      l3: Uso do logotipo do Decidim no rodapé de uma instância (“Desenvolvido por Decidim”).
      title: Exemplos de uso que não precisam de permissão
    examples-2:
      l1: Vendendo mercadorias (adesivos, camisetas, canecas, etc).
      l2: Uso do logotipo do Decidim em capa de livros.
      l3: Uso do logotipo do Decidim em um cabeçalho em um site, o que significa que você é a organização Decidim.
      title: Exemplos de uso que precisam de permissão
    examples-3:
      l1: Dar à sua empresa ou produto o nome do Decidim, como "Os Consultores do Decidim".
      title: Exemplos de uso que não obterão permissão
    goals:
      l1: Gostaríamos de simplificar para qualquer pessoa usar o nome ou logotipo do Decidim para esforços voltados para a comunidade que ajudem a divulgar e melhorar o Decidim.
      l2: Gostaríamos de deixar claro como os negócios e projetos relacionados ao Decidim podem (e não podem) usar o nome e o logotipo Decidim.
      l3: Gostaríamos de dificultar o uso do nome e logotipo do Decidim para lucrar injustamente, enganar ou confundir pessoas que procuram recursos oficiais do Decidim.
    p1: '"Decidim" e o logotipo do Decidim são marcas registradas da Associació de Software Lliure Decidim. Você não pode usar essas marcas registradas em um ambiente comercial para inferir que seu produto ou serviço é endossado ou associado à Decidim sem permissão. Você pode usar essas marcas para se referir ao Decidim de uma forma que fique claro que você está simplesmente se referindo ao projeto, não reivindicando endosso ou associação.'
    p2: 'Se estiver usando o logotipo do Decidim de alguma forma, é necessário adicionar o seguinte texto: <i>"O nome e o logotipo do Decidim são marcas registradas da Associació de Software Lliure Decidim."</i>'
    p3: 'Desenvolvemos esta política de trademark com os seguintes objetivos em mente:'
    p4: Você pode solicitar permissão enviando um e-mail para associacio@decidim.org.
    p5: Esta página de política de marcas foi baseada em <a href="%{rails_url}">Ruby on Rails</a> e <a href="%{wordpress_url}">Wordpress Foundation</a>.
    title: Política de marca registrada
