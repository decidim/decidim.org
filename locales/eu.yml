    title: Dokumentazioa
  faqs:
    cta: Irakurri galdera guztiak
    questions:
      q01:
        answer: 'Decidim Free Open-Source demokrazia parte-hartzailearen plataforma bat da, hiri eta erakundeentzat. Baina Decidim plataforma digital bat baino gehiago da: proiektu eta azpiegitura komun bat da, doakoa eta irekia, non kodea, dokumentazioa, diseinua, prestakuntza-ikastaroak, lege-esparru bat, elkarlaneko interfazeak, erabiltzaile- eta bideratze-komunitateak eta ikuspegi komuna biltzen diren.'
        question: Zer da Decidim?
      q02:
        answer: Gaur egun mundu osoko hiri eta erakundeek erabiltzen dute. Izan ere, edozein taldek erabil dezake, GKE, unibertsitate, sindikatu, kooperatiba, auzo elkarte eta abarrek. Kontsultatu [complete list of currently active instances](/usedby/).
        question: Nork erabiltzen du Decidim egun?
      q03:
        answer: Erraz konfiguratu partaidetza-prozesuak Plan estrategiko bat egin nahi duzu? Edo araudi berriak eztabaidatu? Edo plaza berri bat edo eraikin publiko bat eztabaidatu guztion onerako? Decidim-i esker, parte hartzeko guneak konfiguratu ahal izango dituzu (ekimenak, batzarrak, prozesuak edo kontsultak) eta horiek aberastu ahal izango dituzu eskura dituzun osagai anitzen bidez (aurrez aurreko bilerak, inkestak, proposamenak, bozketak, emaitzen jarraipena, iruzkinak eta beste asko).
        question: Zer egin dezake Decidim-eko administratzaile batek?
      q04:
        answer: Decidim delakoak milaka pertsona demokratikoki antolatzeko aukera ematen du, proposamenak eginez, bilera publikoetara joanez, erabakiak hartzeko eztabaidak sustatuz, botoa emateko modu desberdinen bidez erabakiz eta erabakien betearazpena kontrolatuz.
        question: Zer egin dezake Decidim-eko parte-hartzaile batek?
      q05:
        answer: Bai, badugu demo bat. [online demo](/demo).
        question: Demo bat duzu? Decidim erabili nahi dut orain, instalatu gabe, nola funtzionatzen duen ikusteko.
      q06:
        answer: Bertsio berri bat argitaratzen dugu, gutxi gorabehera hilero. Ikusi [record of versions].
        question: Zenbatean behin eguneratzen da plataforma?
      q07:
        answer: Decidim instalatzea erraza da, baina ezagutza eta eskakizun tekniko batzuk behar dituzu. Ikusi Decidim instalatzeko dokumentazioa [documentation for installing Decidim](https://docs.decidim.org/en/install/).
        question: Zer behar dut Decidim instalatzeko?
      q08:
        answer: "Proiektuaren ezaugarri berrien mapa [roadmap of new features of the project at GitHub]\n(https://github.com/decidim/decidim/projects/16)."
        question: Non aurki ditzaket proiektuaren ibilbide-orria eta aurreikusitako ezaugarriak?
      q09:
        answer: <p>Decidim herritarren parte-hartzerako plataforma bat da, pertsonentzat eta pertsonen eskutik sortua. Bere iturburu-kodea irekia da, eta edonork ikuskatzea, aldatzea eta hobetzea posible da. Decidim softwarea <a href="https://en.wikipedia.org/wiki/GNU_Affero_General_Public_License">AGPL lizentziapean</a> dago. Horrek esan nahi du erabil dezakezula, alda dezakezula eta berau eratorritako bertsioetan birbanatu dezakezula, betiere AGPL lizentzia errespetatzen baduzu.</p>  .
        question: Zer esan nahi du Decidim doakoa, "librea" eta kode irekikoa izateak?
      q10:
        answer: Modu askotara lagun dezakezu. Horietako bat komunitatea da (http://meta.decidim.org). Funtzio berriak proposatu nahi badituzu, jo hona (https://meta.decidim.org/processes/roadmap). Akatsak antzeman badituzu eta jakinarazi nahi badituzu, jo prozesu honetara (https://meta.decidim.org/processes/bug-report). Metadecidim komunitatean aktiboki parte hartu nahi baduzu, Komunitate-bileretara joan zaitezke. Eman izena komunitatean parte hartzeko eta gurekin parte hartzeko. Zure kontua kodea bada, zatoz Githubera (https://github.com/decidim/decidim). Ikertzailea bazara, interesa izan dezakezu [LAB Metadecidim Seminars](https://meta.decidim.org/assembly/eix-lab).
        question: Funtzionalitate berriei buruzko ideiak ditut, hobekuntzak. Proiektua hobeto ezagutu nahi dut, zer egin dezaket?
      q11:
        answer: Zure zalantzak azkar argitzeko modurik onena Metadecidim komunitatea da. Sartu orain prozesuan [Support Forum](https://meta.decidim.org/processes/supportforum?locale=en) eta ikusi ea zure galdera existitzen den edo erantzunda dagoen; bestela, sartu eta egin zure galdera. Arazoa espazio honetan konpontzerik ez baduzu, agian gurekin harremanetan jartzeko unea da [harremanetarako formularioaren](/contact) bidez.
        question: Zalantza asko ditut, era guztietakoak... non galdetu edo argitu ditzaket?
      q12:
        answer: Gure administratizalearen eskuliburuaren azken bertsioa kontsulta dezakezu [Documentation section](https://docs.decidim.org) atalean.
        question: Ba al dago tutorialik martxan jartzeko?
      q13:
        answer: Horrela deitzen diogu gure Berme Demokratikoen eta Elkarlan Demokratikoaren Kodeari. Herritar guztiek onartu behar dute [Social Contract](http://decidim.org/contract).
        question: Zer da Kontratu Soziala?
      q14:
        answer: 'Aldaketa asko daude: funtzionalitateak, malgutasuna, arkitektura, modularitatea, etab. Galdera honi erantzuten saiatzeko, [published a post](/blog/2019-01-14-consul-comparison/).'
        question: Zeintzuk dira Consul / Decide Madrid proiektuarekin dauden aldeak?
      q15:
        answer: "[Metadecidim](http://meta.decidim.org) Decidim komunitatea da, plataformaren diseinuan eta Decidim proiektuaren eraikuntzan elkarlanean aritzen dena. Aldizka biltzen gara Community Meetings-en bidez, plataformaren alderdi teknologikoei buruz hitz egiteko, eta Labs-en bidez, [Research](https://meta.decidim.org/assemblies/eix-lab) bileretarako. Urteko gure konferentzia Decidim Fest da. Joan [meta.decidim.org](http://meta.decidim.org) webgunera deialdiak gertutik jarraitzeko eta komunitatean parte hartu nahi baduzu. Gustura hartuko zaitugu ;-)"
        question: Zer da Metadecidim komunitatea?
      q16:
        answer: Noski baietz. Jendeak Metadecidim-en aurki ditzakezun partaidetza-prozesuen, eztabaiden, itzulpenen eta abarren bidez egiten du. Decidim Bartzelonan jaio zen eta horregatik lotura handia dago hiri honekin, baina batez ere komunentzako proiektua da.
        question: Metadecidim komunitatean sar naiteke Bartzelonan bizi ez banaiz ere?
      q17:
        answer: Elkarlan demokratikoarekiko fede ona eta jarrera zuzena duen edonor.
        question: Zer nolako kideak onartzen dira Metadecidim komunitatean?
      q18:
        answer: '"Asociacion de Software Libre Decidim" (Decidim Software Librearen Elkartea) Decidim komunitatearen gobernantzarako elkarte demokratikoa da. [February 16, 2019 in an extraordinary assembly of the community](https://meta.decidim.org/processes/decidim-gov/f/959/meetings/1169) sortu zen, erakundearen estatutuak onartu ostean.'
        question: Zer da Decidim elkartea?
      q19:
        answer: '[general assembly of the Decidim Association](https://meta.decidim.org/assemblies/general-assembly-association) atalean gure buruzko informazio gehiago aurki dezakezu, bileraren jarduera jarraitu eta informazio garrantzitsua kontsultatu (estatutuak, lege-akordioak, barne-araudia)'
        question: Nola eskuratu dezaket Decidim Elkarteari buruzko informazio gehiago?
      q20:
        answer: Orain, proiektuan parte hartzen dutenak tokiko inplementatzaileak izan daitezke. (https://meta.decidim.org/assemblies/QuieroSerSocia?locale=es)
        question: How can I become a member of the Decidim Association?
      q21:
        answer: "Bai, ahal duzu! Decidim irabazi-asmorik gabeko proiektua da, eta oraingoz finantzaketaren mende dago erabat. Mesedez, bilatu xehetasun guztiak proiektua finantzatzeko [OpenCollective]\n(https://opencollective.com/decidim)"
        question: Proiektua finantzatzeko interesa daukat, zein da prozesua?
      q22:
        answer: Yes, we have templates to formalize collaboration agreements. [Please contact us](/contact).
        question: Lankidetza hitzarmen bat egin nahi dugu, ba al dituzue erabili ditzakegun txantiloirik?
      q23:
        answer: "Bai, baina pazientzia izan behar duzu. Erakunde askok erabili nahi dute Decidim une honetan, eta urratsez urrats laguntzen diegu. [Contact us](/contact)\nedozein galdera egiteko eta lehenbailehen erantzungo dizugu."
        question: Laguntza ematen diete erakunde publikoei?
      q24:
        answer: Decidim eta Decidim-en logoa Elkarteak erregistratzen ditu, ezin dira produktu komertzial gisa erabili eta ezin dira saldu. Erabiltzen bada, kreditua proiektuarekin erlazionatu behar da. Honi buruz gehiago irakur dezakezu gure [Trademark policy](/trademark-policy).
        question: Zein da Decidim-en marka-politika?
