  feature_cards:
    meetings:
      f3: Organize face-to-face or online <strong>meetings</strong>, manage registrations, and publish the agenda.<br> And much more!
    proposals:
      f1: Collect <strong>proposals</strong> from participants, enriched with geolocation and attachments, merge similar ones, and set a workflow for official approval or rejection.
    voting:
      f2: Prioritize proposals using various <strong>voting</strong> methods, such as setting minimum and maximum thresholds, weighted voting, or participatory budgeting.
  features:
    component_groups:
      group_1:
        title: Receive Contributions
      group_2:
        title: Discuss and deliberate
      group_3:
        title: Make Decisions
      group_4:
        title: Communicate Results to your audience
    intro: You can use the Decidim software in a public or private organisation, with hundreds or thousands of potential participants, such as a city council, public institution, associations, NGOs, universities, trade unions, cooperatives or neighbourhood communities. With Decidim you will be able to configure spaces for digital participation and organize contributions and discussions through the multiple available components.
    modules:
      button: C'est parti !
      intro: Grow beyond the default components.
      subtitle: The Decidim community has developed hundreds of modules to expand the platform beyond the basics and cater to your needs even better.
      title: Modules
    need_help:
      button: Partenaires
      subtitle: Take a look at the partners community, Decidim official service providers that can assist you on the installation journey, the hosting and maintenance of your platform.
      title: Need help in the installation?
    page:
      feature1:
        label: Concertations
        subtitle: Pour démocratiser les problèmes communs, pas à pas
        text: 'Les concertations sont des espaces qui permettent de créer, activer/désactiver et gérer différents processus participatifs. Ils se distinguent des autres espaces par leur structuration en différentes étpaes au sein desquelles toutes les fonctionnalités peuvent être incorporées. Les exemples de concertations sont : un processus électoral pour les membres d''un comité, un budget participatif, un processus de planification stratégique, la rédaction collaborative d''un règlement ou d''une norme, la conception d''un espace urbain ou la production d''un plan de politique publique.'
        title: Concertations
      feature10:
        subtitle: Analyser, synthétiser et construire en commun
        text: Peuvent être utilisés pour convertir de longs documents textes en différentes propositions ou, à l'inverse, pour composer et afficher un texte basé sur un ensemble de propositions.
        title: Collaborative texts
      feature11:
        label: Conferences
        subtitle: Là où les grands événements sont mis en avant
        text: Créez un site web pour un grand événement. Unifiez le programme en joignant une série de rencontres prédéfinies (chats, ateliers, etc.), et gérez les participants.
        title: Conferences
      feature12:
        subtitle: Parce que l'opinion de votre communauté importe
        text: Concevoir et publier des enquêtes. Afficher et télécharger les résultats.
        title: Enquêtes
      feature13:
        subtitle: Égalité et justice du hasard
        text: Permet de sélectionner un certain nombre de propositions (par exemple les candidats à un jury) avec des procédures aléatoires, mais reproductibles, qui garantissent des distributions non biaisées et uniformes.
        title: Tirage au sort
      feature14:
        subtitle: Construire une intelligence collective
        text: Permet aux utilisateurs d'ajouter des commentaires, de leur donner une valeur pour, contre ou neutre, de leur donner des votes, d'y répondre et de recevoir des notifications en cas de réponses.
        title: Commentaires
      feature15:
        subtitle: Votre communauté, informée et à jour
        text: Créez des pages informatives avec une mise en forme de texte riche, des images et des vidéos intégrées. La fonctionnalité Articles permet la création d'articles de blog et la communication des nouveautés de vos dispositifs.
        title: Pages et articles
      feature16:
        subtitle: Informations personnalisées selon vos intérêts
        text: Decidim vous permet de suivre n'importe quel espace ou fonctionnalité afin que vous puissiez recevoir des mises à jour chaque fois sur les contenus qui vous intéressent.
        title: Notifications
      feature17:
        subtitle: Simple mais puissant
        text: Envoyez des emails à tous ceux qui sont inscrits sur la plateforme ou à ceux qui participent à un espace spécifique.
        title: Bulletin d'information (newsletter)
      feature18:
        subtitle: To promote community deliberation
        text: Ask a question about any topic related to a process, receive comments, participate in discussion threads and close the debate with a conclusion.
        title: Debates
      feature19:
        subtitle: Democratic and transparent decision-making
        text: Add your project proposal about your city district, vote and give support to those that resonate with you, co-create collective ideas and give a specific amount of money to each one. 
        title: Budgets participatifs
      feature2:
        label: Assemblées
        subtitle: Le pouvoir de l'auto-organisation collective
        text: Permet de mettre en place des organes ou des groupes de décision (conseils, groupes de travail, comités, etc.) qui se réunissent périodiquement, de détailler leur composition, ou encore de répertorier et géolocaliser leurs rencontres. Permet d'y participer, par exemple, en assistant à une réunion s'il reste des places, en ajoutant des points à l'ordre du jour ou en commentant les propositions et les décisions prises.
        title: Assemblées
      feature20:
        subtitle: Simple and user-friendly voting processes
        text: Set up elections to support decision-making. Upload your census or activate a token system for voting. Participants cast their votes through a secure voting booth, and once voting closes, you can publish the results.
        title: Elections
      feature3:
        subtitle: Décidez de votre choix
        text: 'Offer organisations the possibility of activating different voting systems around proposals: unlimited, limited to a given threshold, cost-based, etc.'
        title: Conferences
      feature4:
        label: Pétitions
        subtitle: Définir les objectifs de chacun, à portée de tous
        text: Les participants peuvent créer des pétitions collaboratives, définir leur calendrier et leurs objectifs, recueillir des soutiens, discuter, débattre et diffuser des pétitions, fixer des points de rencontres où les signatures peuvent être recueillies directement auprès des participants ou ouvrir des débats accessibles à tous. 
        title: Pétitions
      feature5:
        subtitle: Vos idées en détail
        text: Créer une proposition en utilisant un assistant de création, la comparer avec les propositions existantes, la publier sur la plateforme et inclure des informations supplémentaires telles que la géolocalisation ou des documents et images joints. Cette fonctionnalité vous permet également de naviguer, de filtrer et d'interagir avec un ensemble de propositions. De plus, avec l'incubateur de proposition vous pouvez créer des propositions collaboratives.
        title: Propositions
      feature6:
        subtitle: Décidez de votre choix
        text: 'Offre aux organisations la possibilité d''activer différents systèmes de vote ou de soutien autour de propositions la concernant : illimité, limité à un seuil donné, pondéré, basé sur les coûts, etc. Soutenu par une technologie de vote électronique sécurisée et chiffrée.'
        title: Élection
      feature7:
        subtitle: Aucune proposition sans réponse
        text: Transformez les propositions en résultats et donnez-leur des réponses officielles concernant leur acceptation ou leur rejet, en fusionnant différentes propositions en un seul résultat.
        title: Résultats
      feature8:
        subtitle: Transparence de bout en bout
        text: Keep participants informed of the status of implementation. Based on the proposals, define results, create and apply progress reports on their implementation, and show the degree to which the results have been achieved.
        title: Suivi des réalisations
      feature9:
        subtitle: Pour se rencontrer et ne rien manquer
        text: La fonctionnalité rencontres offre aux organisations et aux participants la possibilité de convoquer des réunions, de déterminer leur lieu et leur heure, de s'y inscrire, d'en limiter les places, de définir la structure et le contenu de la réunion ainsi que publier les comptes-rendus et les propositions qui en résultent.
        title: Rencontres
    section3:
      text: Thanks to its modular architecture and scalable logic, you can configure a powerful system of democratic participation in all kinds of organizations. Choose the features that best suit your needs and customise your participatory process.
      title: A <span class="text-red-500">customizable system</span> for <br/>participation
    section4:
      link: Try our online demo
      title: Want to play and see how it works in a real-world environment?
    subtitle: The platform for democratic organisations and communities of any size and kind.
    title: Fonctionnalités
    type1:
      title: Espaces de participation
    type2:
      subtitle: Participatory spaces can be combined with components that push participation and adapt to your needs. You can add all the features you want and customise your platform.
      title: Fonctionnalités
