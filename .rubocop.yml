inherit_from:
  - configuration-c39e21b1a157886216c51863e3ca4762.yml
  - configuration-283ea6ccb2f6a592c0c314fe21cb63d3.yml

plugins:
  - rubocop-rspec
  - rubocop-capybara

require:
  - rubocop-rake

AllCops:
  Include:
    - "**/*.rb"
    - "**/*.rake"
    - "**/*.ru"
    - "**/Gemfile"
    - "**/Rakefile"
  Exclude:
    - "node_modules/**/*"
    - "db/schema.rb"
    - "vendor/**/*"
