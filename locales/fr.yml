      title: Democratize Public Decision-Making
    intro: It’s a free/libre and open-source web-based software, maintained by an extensive and active community. It’s designed to help governments, organizations, and communities to engage people in transparent, structured decision-making processes.
    section2:
      link: Read more case studies
      subtitle: Learn how cities, governments, and organisations are already using Decidim in different ways and scenarios, with diverse purposes and stories. Check out some inspiring successful cases!
      title: Cas d'usages
    section3:
      link: Lire l'étude de cas
      title: Soutenu par la technologie, la démocratie et l'expérience
    section4:
      button1: À propos de nous
      intro: The Decidim Free Software Association is a democratic association for the governance of the Decidim community in charge of maintaining the source code.
      subtitle: Metadecidim is the community that collaborates in the design of the platform and the development of the project. Together we design and create new features and report bugs for continuous improvement of the platform.
      title: Qui est derrière la plateforme ?
    section5:
      intro: 'With Decidim you can:'
      link: Explore the features
      subtitle: Decidim’s flexible features are designed to serve both small and large collectives, public and private organisations, with hundreds or thousands of potential users, such as city councils, associations, universities, NGOs or cooperatives.
      title: Is Decidim the right tool for you?
    section6:
      intro: To start using Decidim, you must install the application on a server. Because Decidim is built with Ruby on Rails, the installation requires a developer with experience in this framework.
