    examples-1:
      l1: A Decidim logó feltüntetése a termékoldalakon, hogy "a Decidimmel dolgozunk" (pl. tárhely, tanácsadási szolgáltatások, Decidim alapú fejlesztések).
      l2: A "Decidim" védjegy használata könyvcímekben és kutatási cikkekben.
      l3: A Decidim logó használata a példány láblécében ("Powered by Decidim").
      title: Példák az engedély nélküli felhasználásra
    examples-2:
      l1: Árucikkek (matricák, pólók, bögrék stb.) értékesítése.
      l2: A Decidim logó használata a könyvborítón.
      l3: A Decidim logó használata egy weboldal fejlécében, ami azt sugallja, hogy Ön a Decidim szervezet.
      title: Példák az engedélyköteles felhasználásra
    examples-3:
      l1: Nevezze el cégét vagy termékét a Decidim után, például "Decidim tanácsadók".
      title: Példák az engedély nélküli felhasználásra
    goals:
      l1: Szeretnénk megkönnyíteni bárki számára, hogy a Decidim nevet vagy logót olyan közösségi célú erőfeszítésekhez használja, amelyek segítenek a Decidim terjesztésében és fejlesztésében.
      l2: Szeretnénk tisztázni, hogy a Decidimhez kapcsolódó vállalkozások és projektek hogyan használhatják (és hogyan nem) a Decidim nevet és logót.
      l3: Szeretnénk megnehezíteni, hogy a Decidim nevet és logót bárki arra használja, hogy tisztességtelenül hasznot húzzon, becsapja vagy összezavarja azokat, akik hivatalos Decidim-forrásokat keresnek.
    p1: 'a "Decidim" és a Decidim logó az Associació de Software Lliure Decidim bejegyzett védjegye. Ezeket a védjegyeket kereskedelmi környezetben nem használhatja engedély nélkül arra a következtetésre, hogy termékét vagy szolgáltatását a Decidim támogatja vagy azzal kapcsolatban áll. Ezeket a védjegyeket használhatja a Decidimre való hivatkozásra olyan módon, hogy egyértelmű legyen, hogy egyszerűen csak a projektre utal, és nem állítja, hogy támogatja vagy társítja azt.'
    p2: 'Ha bármilyen módon használja a Decidim logót, a következő szöveget kell hozzáadnia: <i>"A Decidim név és logó az Associació de Software Lliure Decidim bejegyzett védjegye"</i>'
    p3: 'Ezt a védjegyhasználati szabályzatot a következő célokat szem előtt tartva dolgoztuk ki:'
    p4: Engedélyt a associacio@decidim.org e-mail címen kérhet.
    p5: Ez a védjegypolitikai oldal <a href="%{rails_url}">Ruby on Rails</a> és <a href="%{wordpress_url}">Wordpress Foundation</a> alapokon nyugszik.
