  partnership-policy:
    explanation:
      p1: A Decidim fenntartása időt és erőforrásokat igényel. Számos feladatot kell elvégezni, mint például a hozzájárulások felülvizsgálata, a problémák kezelése, a hibák kijavítása, a dokumentáció megírása és a közösség által megosztott általános kétségek megválaszolása. Minden szervezet (vállalkozás, egyesület vagy kollektíva), amely hajlandó Decidim-partnerré válni, vállalja, hogy a Decidim-tevékenységekből származó éves bevétel 3% -ának megfelelő kedvezményes díjjal járul hozzá a Decidim Egyesülethez. Nonprofit szervezetek esetében ez a díj 1,5%.
      p2: Minden Decidim Partner nyilvánosan láthatóvá válik a <a href="%{main_website_url}">Decidim fő weboldalán</a> és a <a href="%{readme_url}">GitHub projekt README oldalán</a>. Ezenkívül a Decidim Egyesület a Decidim Partnereket ajánlja majd a Decidim szolgáltatásokkal kapcsolatos előadásainkon és e-mailes beszélgetéseinkben.
      p3: A nemrégiben bejegyzett szervezetek támogatása érdekében a Decidim-partnerek mentesülnek a gazdasági hozzájárulás alól az első évben, hogy először a Decidimmel közösen dolgozzák ki üzleti tervüket. Addig is javasoljuk, hogy a Decidim Partnerek találjanak más módot a projekthez való hozzájáruláshoz (például hibabejelentéssel, dokumentációval, közösségi tevékenységekben való részvétellel és támogatással stb.).
    how_to:
      steps:
        step1: Küldj egy e-mailt az associacio [at] decidim [dot] org címre az elérhetőségeiddel, és a tárgyban írd be, hogy Decidim partner akarok lenni.
        step2: Felvesszük Önnel a kapcsolatot egy videokonferencia céljából, hogy ezt követően értékeljük a jelöltséget.
        step3: Ha a jelölést jóváhagyják, a Koordinációs Bizottság évente küld Önnek egy eskü alatt tett nyilatkozatot, amelyet ki kell töltenie és a megfelelő banki átutalás átvételével együtt visszaküldenie.
      title: Hogyan válhatok Decidim Partnerré?
    requirements:
      l1: Az esetek kezelése. A Decidim egy vagy több aktív létesítményének kezelése a kérelem benyújtásakor, a szervezet vagy harmadik felek saját használatára.
      l2: Hozzájárulás a projekthez. Jelentős mértékben hozzájárult vagy hozzájárult a Decidim projekthez.
      p1: 'A tagság feltétele, hogy elfogadja és aláírja a <a href="%{social_contract_url}">Társadalmi Szerződést</a>, valamint teljesítse az alábbi feltételek bármelyikét:'
